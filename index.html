<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap"
    rel="stylesheet"
    />
    <title>Collections</title>
  </head>
  <body>
    <section class="collections">
        <div class="container">
            <header class="header">
              <div class="logo-container">
                <a href="/" class="logo" aria-label="The Art Museum home">THE ART MUSEUM</a>
              </div>
              <h1 class="page-title">Collections</h1>
              <button class="hamburger__menu-button" type="button" aria-label="Open menu">
                  <i class="hamburger-menu"></i>
              </button>
              <ul class="menu" hidden>
                  <li class="menu-item">
                      <i class="menu-icon search-menu"></i>
                      <label class="collections__search-label" for="collection-search">
                          Search
                      </label>
                      <input class="collections__search-input" type="text">
                  </li>
                  <li class="menu-item">
                      <i class="menu-icon exhibitions-menu"></i>
                      <a href="#" class="menu-item">Exhibitions & Events</a>
                  </li>
                  <li class="menu-item">
                      <i class="menu-icon artists-menu"></i>
                      <a href="#" class="menu-item">Artists & Artworks</a>
                  </li>
                  <li class="menu-item">
                      <i class="menu-icon collections-menu"></i>
                      <a href="./collections.html" class="menu-item">Collections</a>
                  </li>
                  <li class="menu-item">
                      <i class="menu-icon plan-menu"></i>
                      <a href="#" class="menu-item">Plan Your Visit</a>
                  </li>
                  <li class="menu-item">
                      <i class="menu-icon member-menu"></i>
                      <a href="#" class="menu-item">Become a Member</a>
                  </li>
                  <li class="menu-item">
                      <i class="menu-icon shop-menu"></i>
                      <a href="./tickets.html" class="menu-item">Shop</a>
                  </li>
              </ul>
            </header>
            <div class="collections__search-container">
                <form class="collections__search-form">
                    <input name="collections__search" class="collections__search" placeholder="Explore the Collection" aria-label="Search collection" />
                    <button class="collections__search-button" aria-label="Search">
                      <i class="search-icon"></i>
                    </button>
                </form>
                <a class="collections__advanced-search" href="#">Advanced Search</a>
            </div>
            <div class="collections__item_container">
                <div class="collections__item">
                    <img src="/src/assets/images/collections-1.png" alt="" class="collections__image">
                    <h2 class="collections__title narrow">DECORATIVE ARTS & CRAFTS</h2>
                </div>
                <div class="collections__item">
                    <img src="/src/assets/images/collections-2.png" alt="" class="collections__image">
                    <h2 class="collections__title narrow">AMERICAN IMPRESSIONISM</h2>
                </div>
                <div class="collections__item">
                    <img src="/src/assets/images/collections-3.png" alt="" class="collections__image">
                    <h2 class="collections__title">DE STIJL</h2>
                </div>
                <div class="collections__item">
                    <img src="/src/assets/images/collections-4.png" alt="" class="collections__image">
                    <h2 class="collections__title">CUBISM</h2>
                </div>
                <div class="collections__item">
                    <img src="/src/assets/images/collections-5.png" alt="" class="collections__image">
                    <h2 class="collections__title narrow">AMERICAN PHOTOGRAPHY</h2>
                </div>
                <div class="collections__item">
                    <img src="/src/assets/images/collections-6.png" alt="" class="collections__image">
                    <h2 class="collections__title">GREEK ANTIQUITIES</h2>
                </div>
            </div>
        </div>
    </section>
    
    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
